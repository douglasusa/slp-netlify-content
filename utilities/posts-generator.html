<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SLP Posts JSON Generator</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body {
    font-family: system-ui, sans-serif;
    margin: 40px auto;
    max-width: 900px;
    line-height: 1.6;
    color: #222;
  }
  h1 { font-size: 28px; margin-bottom: 10px; }
  label { font-weight: 600; display: block; margin-top: 20px; }
  input, textarea, select {
    width: 100%;
    padding: 10px;
    margin-top: 6px;
    border: 1px solid #ccc;
    border-radius: 6px;
    font-size: 16px;
  }
  textarea { height: 140px; }
  button {
    margin-top: 25px;
    padding: 12px 20px;
    font-size: 16px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
  }
  .primary { background: #0057ff; color: #fff; }
  .secondary { background: #444; color: #fff; margin-left: 10px; }
  pre {
    background: #f4f4f4;
    padding: 20px;
    border-radius: 6px;
    white-space: pre-wrap;
    margin-top: 30px;
  }
</style>
</head>

<body>

<h1>SLP Posts JSON Generator</h1>
<p>Generate clean, structured JSON entries for the SLP Content Hub.</p>

<label>Title</label>
<input id="title" type="text" placeholder="Enter post title">

<label>Category</label>
<select id="category">
  <option value="faqs">FAQs</option>
  <option value="blog">Blog</option>
  <option value="case-studies">Case Studies</option>
  <option value="resources">Resources</option>
</select>

<label>Slug (auto-generated)</label>
<input id="slug" type="text" placeholder="auto-generated…" readonly>

<label>Summary</label>
<textarea id="summary" placeholder="Short description of the post"></textarea>

<button class="primary" onclick="generateJSON()">Generate JSON</button>
<button class="secondary" onclick="copyJSON()">Copy to Clipboard</button>
<button class="secondary" onclick="downloadJSON()">Download posts.json</button>

<pre id="output"></pre>

<script>
function slugify(text) {
  return text
    .toLowerCase()
    .replace(/[^a-z0-9]+/g, '-')
    .replace(/(^-|-$)/g, '');
}

document.getElementById('title').addEventListener('input', () => {
  const title = document.getElementById('title').value;
  document.getElementById('slug').value = slugify(title);
});

function generateJSON() {
  const title = document.getElementById('title').value.trim();
  const category = document.getElementById('category').value;
  const slug = document.getElementById('slug').value;
  const summary = document.getElementById('summary').value.trim();

  if (!title || !slug) {
    alert("Title is required.");
    return;
  }

  const entry = {
    title: title,
    category: category,
    slug: slug,
    summary: summary,
    url: `/${category}/${slug}.html`
  };

  document.getElementById('output').textContent = JSON.stringify(entry, null, 2);
}

function copyJSON() {
  const text = document.getElementById('output').textContent;
  navigator.clipboard.writeText(text);
  alert("JSON copied to clipboard.");
}

function downloadJSON() {
  const text = document.getElementById('output').textContent;
  const blob = new Blob([text], { type: "application/json" });
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "posts.json";
  a.click();

  URL.revokeObjectURL(url);
}
</script>

</body>
</html>
