<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog | Strategic Lab Partners</title>
  <link rel="stylesheet" href="/styles.css" />
  <style>
    .blog-container {
      max-width: 1100px;
      margin: 60px auto;
      padding: 0 20px;
    }
    .blog-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 30px;
    }
    .blog-card {
      border: 1px solid #ddd;
      border-radius: 8px;
      overflow: hidden;
      background: #fff;
      transition: transform 0.2s ease;
    }
    .blog-card:hover {
      transform: translateY(-4px);
    }
    .blog-card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
    }
    .blog-card-content {
      padding: 20px;
    }
    .blog-card h3 {
      margin-top: 0;
      font-size: 1.3rem;
    }
    .blog-card p {
      color: #555;
    }
    .blog-card a {
      text-decoration: none;
      color: inherit;
    }
  </style>
</head>
