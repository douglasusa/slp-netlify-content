<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SLP Blog | Strategic Lab Partners</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="/resources/css/main.css">
  <link rel="stylesheet" href="/resources/css/resources.css">
</head>

<body>

<header class="site-header">
  <div class="container header-container">
    <a href="/" class="logo">
      <img src="/assets/logos/slp-white-full-logo.png" alt="Strategic Lab Partners">
    </a>
    <nav class="main-nav">
      <ul>
        <li><a href="/">Home</a></li>
        <li><a href="/resources/">Resources</a></li>
        <li><a href="/blog/" class="active">Blog</a></li>
      </ul>
    </nav>
  </div>
</header>

<main class="container resource-section">

  <h1>SLP Blog</h1>
  <p class="intro">
    Operational intelligence, logistics insights, and precision‑driven perspectives from Strategic Lab Partners.
  </p>

  <div id="blog-grid" class="resource-grid">
    <!-- Blog cards will be injected here -->
  </div>

</main>

<footer class="site-footer">
  <div class="container">
    <p>© 2026 Strategic Lab Partners — All Rights Reserved.</p>
  </div>
</footer>

<script>
  async function loadBlogPosts() {
    try {
      const response = await fetch('/blog/posts.json');
      const posts = await response.json();

      const grid = document.getElementById('blog-grid');
      grid.innerHTML = '';

      posts.sort((a, b) => new Date(b.date) - new Date(a.date));

      posts.forEach(post => {
        const card = document.createElement('article');
        card.className = 'resource-card';

        card.innerHTML = `
          <img src="${post.hero}" alt="${post.title}" style="max-width:100%; height:auto; margin-bottom:12px;">
          <h3>${post.title}</h3>
          <p>${post.excerpt}</p>
          <a href="/blog/${post.slug}" class="btn">Read Blog</a>
        `;

        grid.appendChild(card);
      });

    } catch (error) {
      console.error('Error loading blog posts:', error);
    }
  }

  loadBlogPosts();
</script>

</body>
</html>
