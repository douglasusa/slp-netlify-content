name: Validate posts.json

on:
  push:
    paths:
      - 'content/blog/posts.json'
  pull_request:
    paths:
      - 'content/blog/posts.json'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Validate posts.json
        run: |
          python3 -m json.tool content/blog/posts.json > /dev/null
